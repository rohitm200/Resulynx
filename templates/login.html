{% extends 'base.html' %}
{% block title %}Login | ResuLynx{% endblock %}
{% block content %}

<div class="auth-container">
    <div class="auth-card">
        <p class="eyebrow">Secure access</p>
        <h2>Welcome back</h2>
        <p class="auth-subtitle">Sign in to review resumes and candidate scores.</p>

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <label>Username</label>
                {{ form.username }}
            </div>

            <div class="input-group">
                <label>Password</label>
                {{ form.password }}
            </div>

            <button class="btn-primary" type="submit">Login</button>
        </form>

        <p>New user? <a href="/register/">Create account</a></p>
    </div>
</div>

{% endblock %}
