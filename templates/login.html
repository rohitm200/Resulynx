{% extends 'base.html' %}
{% block content %}

<div class="form-container">
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <p><a href="/register/">Don't have an account? Register</a></p>
</div>

{% endblock %}
