{% extends 'base.html' %}
{% block content %}

<div class="form-container">
    <h2>Register</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p><a href="/login/">Already have an account? Login</a></p>
</div>

{% endblock %}
